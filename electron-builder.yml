appId: com.terminal-ai.app
productName: Terminal AI
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - assets/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
